<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BootPilot 3.0</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;max-width:700px;margin:auto;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:15px}
input,button{width:100%;padding:12px;font-size:18px;margin:6px 0;border-radius:8px;border:none}
button{background:#0ea5e9;color:#fff;font-weight:bold}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #555;padding:6px;text-align:center}
</style>
</head>
<body>
<h2>🚤 BootPilot 3.0</h2>

<div class="card">
<label>Tankgröße (Liter)</label>
<input id="tankMax" type="number" step="0.1" value="25">
<label>Aktueller Tank (Liter)</label>
<input id="tankNow" type="number" step="0.1" value="25">
<label>Verbrauch (l/100 km)</label>
<input id="cons" type="number" step="0.1" value="8.5">
<label>Gefahrene Kilometer</label>
<input id="km" type="number" step="0.1" placeholder="z.B. 18.4">

<button onclick="saveRide()">💾 Fahrt speichern</button>
<button onclick="fillTank()">⛽ Tank voll</button>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">Noch keine Fahrt gespeichert.</p>
</div>

<div class="card">
<h3>Fahrtenbuch</h3>
<table>
<thead><tr><th>Datum</th><th>km</th><th>Liter</th><th>Resttank</th><th>Reichweite</th></tr></thead>
<tbody id="log"></tbody>
</table>
</div>

<script>
let log=JSON.parse(localStorage.getItem("bp_log")||"[]");

function render(){
 document.getElementById("log").innerHTML="";
 log.forEach(r=>{
  document.getElementById("log").innerHTML += `<tr><td>${r.d}</td><td>${r.km}</td><td>${r.l}</td><td>${r.t}</td><td>${r.r}</td></tr>`;
 });
}
render();

function saveRide(){
 let tank=parseFloat(tankNow.value);
 let cons=parseFloat(cons.value);
 let km=parseFloat(document.getElementById("km").value);
 if(isNaN(km)||km<=0){alert("Bitte Kilometer eingeben.");return;}
 let used=km*cons/100;
 if(used>tank){alert("Tank reicht nicht aus.");return;}
 tank-=used;
 tankNow.value=tank.toFixed(2);
 let range=tank/cons*100;
 status.innerHTML=`Verbraucht: <b>${used.toFixed(2)} l</b><br>
 Resttank: <b>${tank.toFixed(2)} l</b><br>
 Restreichweite: <b>${range.toFixed(1)} km</b>`;
 log.unshift({
 d:new Date().toLocaleString("de-DE"),
 km:km.toFixed(1),
 l:used.toFixed(2),
 t:tank.toFixed(2),
 r:range.toFixed(1)
 });
 localStorage.setItem("bp_log",JSON.stringify(log));
 localStorage.setItem("bp_tank",tank);
 localStorage.setItem("bp_max",tankMax.value);
 localStorage.setItem("bp_cons",cons.value);
 document.getElementById("km").value="";
 render();
}
function fillTank(){
 tankNow.value=tankMax.value;
 localStorage.setItem("bp_tank",tankMax.value);
}
window.onload=()=>{
 if(localStorage.getItem("bp_tank")) tankNow.value=localStorage.getItem("bp_tank");
 if(localStorage.getItem("bp_max")) tankMax.value=localStorage.getItem("bp_max");
 if(localStorage.getItem("bp_cons")) cons.value=localStorage.getItem("bp_cons");
 render();
}
</script>
</body>
</html>
