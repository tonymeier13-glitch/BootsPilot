<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BootPilot 3.0 Lite</title>
<style>
body{
    margin:0;
    background:#0d1b2a;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.container{
    max-width:560px;
    margin:auto;
    padding:16px;
}
.card{
    background:#1b263b;
    border-radius:16px;
    padding:16px;
    margin-bottom:16px;
}
h1{text-align:center;}
.value{
    font-size:38px;
    text-align:center;
    font-weight:bold;
}
.small{
    text-align:center;
    color:#ccd6e0;
}
input,button{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin-top:8px;
    border-radius:10px;
    border:none;
    font-size:17px;
}
button{
    background:#00a86b;
    color:white;
}
table{
    width:100%;
    border-collapse:collapse;
}
td,th{
    border-bottom:1px solid #3d506b;
    padding:6px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>🚤 BootPilot 3.0 Lite</h1>

<div class="card">
<div class="value" id="speed">0.0 km/h</div>
<div class="small">GPS-Geschwindigkeit</div>

<div class="value" style="font-size:26px" id="distance">0.00 km</div>
<div class="small">Gefahrene Strecke</div>

<button onclick="startGPS()">GPS starten</button>
</div>

<div class="card">

<label>Tankinhalt (Liter)</label>
<input id="fuel" type="number" value="25">

<label>Reserve (Liter)</label>
<input id="reserve" type="number" value="5">

<label>Verbrauch (l / 100 km)</label>
<input id="cons" type="number" value="5" step="0.1">

<button onclick="calcRange()">Reichweite berechnen</button>

<div class="value" id="range">400 km</div>
<div class="small" id="status">🟢 Alles ok</div>

</div>

<div class="card">

<h3>Fahrtenbuch</h3>

<button onclick="saveTrip()">Aktuelle Fahrt speichern</button>

<table id="log">
<tr>
<th>Datum</th>
<th>km</th>
</tr>
</table>

</div>

</div>

<script>

let watchId=null;
let lastPos=null;
let totalKm=0;

function calcRange(){

const fuel=Number(document.getElementById("fuel").value);
const reserve=Number(document.getElementById("reserve").value);
const cons=Number(document.getElementById("cons").value);

const km=((fuel-reserve)/cons)*100;

document.getElementById("range").textContent=km.toFixed(0)+" km";

const status=document.getElementById("status");

if(km<30){
status.textContent="🔴 Reserve";
}else if(km<60){
status.textContent="🟡 Bald tanken";
}else{
status.textContent="🟢 Alles ok";
}

localStorage.bootpilotFuel=fuel;
localStorage.bootpilotCons=cons;

}

function distance(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

}

function startGPS(){

if(watchId){return;}

watchId=navigator.geolocation.watchPosition(function(pos){

document.getElementById("speed").textContent=
((pos.coords.speed||0)*3.6).toFixed(1)+" km/h";

if(lastPos){

const d=distance(
lastPos.lat,
lastPos.lon,
pos.coords.latitude,
pos.coords.longitude
);

if(d<0.3){
totalKm+=d;
document.getElementById("distance").textContent=
totalKm.toFixed(2)+" km";
}

}

lastPos={
lat:pos.coords.latitude,
lon:pos.coords.longitude
};

},{enableHighAccuracy:true});

}

function saveTrip(){

const trips=JSON.parse(localStorage.bootpilotTrips||"[]");

trips.unshift({
date:new Date().toLocaleDateString(),
km:totalKm.toFixed(2)
});

localStorage.bootpilotTrips=JSON.stringify(trips);

renderTrips();

}

function renderTrips(){

const table=document.getElementById("log");

table.innerHTML="<tr><th>Datum</th><th>km</th></tr>";

const trips=JSON.parse(localStorage.bootpilotTrips||"[]");

trips.forEach(function(t){

table.innerHTML+=
"<tr><td>"+t.date+"</td><td>"+t.km+"</td></tr>";

});

document.getElementById("fuel").value=
localStorage.bootpilotFuel||25;

document.getElementById("cons").value=
localStorage.bootpilotCons||5;

calcRange();

}

renderTrips();

</script>

</body>
</html>
