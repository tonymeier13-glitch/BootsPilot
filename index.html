<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BootPilot</title>
<style>
body{font-family:Arial,sans-serif;background:#0b4f6c;color:#fff;margin:0}
.container{max-width:480px;margin:auto;padding:16px}
.card{background:#125f80;border-radius:12px;padding:14px;margin:12px 0}
input,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;font-size:16px}
button{background:#28a745;color:#fff;font-weight:bold}
.small{font-size:14px}
table{width:100%;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid rgba(255,255,255,.2);text-align:center}
</style>
</head>
<body>
<div class="container">
<h1>🚤 BootPilot</h1>

<div class="card">
<label>Tankgröße (Liter)</label>
<input id="tankSize" type="number" value="25">
<label>Reserve (Liter)</label>
<input id="reserve" type="number" value="2">
<button onclick="tankVoll()">Tank voll</button>
<p>Aktueller Tank: <b><span id="tankNow">25.00</span> l</b></p>
</div>

<div class="card">
<label>Gefahrene Kilometer</label>
<input id="km" type="number" step="0.1">
<label>Verbrauchte Liter</label>
<input id="liters" type="number" step="0.01">
<button onclick="saveTrip()">Fahrt speichern</button>
</div>

<div class="card">
<p>Ø Verbrauch: <b><span id="avg">0.00</span> l/100 km</b></p>
<p>Resttank: <b><span id="rest">0.00</span> l</b></p>
<p>Restreichweite: <b><span id="range">0</span> km</b></p>
</div>

<div class="card">
<h3>Fahrtenbuch</h3>
<table>
<thead><tr><th>Datum</th><th>km</th><th>l</th><th>l/100</th></tr></thead>
<tbody id="log"></tbody>
</table>
<button onclick="clearLog()">Fahrtenbuch löschen</button>
</div>
</div>

<script>
let tank=parseFloat(localStorage.getItem("tankNow"))||25;
let trips=JSON.parse(localStorage.getItem("trips")||"[]");

function tankVoll(){
 tank=parseFloat(document.getElementById("tankSize").value)||0;
 saveState(); render();
}

function saveTrip(){
 let km=parseFloat(document.getElementById("km").value);
 let l=parseFloat(document.getElementById("liters").value);
 if(!km||!l){alert("Bitte Kilometer und Liter eingeben.");return;}
 let cons=l/km*100;
 tank=Math.max(0,tank-l);
 trips.unshift({
   d:new Date().toLocaleDateString("de-DE"),
   km:km.toFixed(1),
   l:l.toFixed(2),
   c:cons.toFixed(2)
 });
 saveState();
 document.getElementById("km").value="";
 document.getElementById("liters").value="";
 render();
}

function clearLog(){
 if(confirm("Fahrtenbuch löschen?")){
   trips=[]; saveState(); render();
 }
}

function saveState(){
 localStorage.setItem("tankNow",tank);
 localStorage.setItem("trips",JSON.stringify(trips));
}

function render(){
 document.getElementById("tankNow").textContent=tank.toFixed(2);
 document.getElementById("rest").textContent=tank.toFixed(2);
 let avg=0;
 if(trips.length){
   avg=trips.reduce((a,t)=>a+parseFloat(t.c),0)/trips.length;
 }
 document.getElementById("avg").textContent=avg.toFixed(2);
 let reserve=parseFloat(document.getElementById("reserve").value)||0;
 let r=0;
 if(avg>0) r=Math.max(0,(tank-reserve)/avg*100);
 document.getElementById("range").textContent=Math.round(r);
 let tb=document.getElementById("log");
 tb.innerHTML="";
 trips.forEach(t=>{
   tb.innerHTML+=`<tr><td>${t.d}</td><td>${t.km}</td><td>${t.l}</td><td>${t.c}</td></tr>`;
 });
}
render();
</script>
</body>
</html>
