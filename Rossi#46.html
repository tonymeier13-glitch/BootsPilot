<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BootPilot</title>
<style>
body{font-family:Arial,sans-serif;background:#0b1726;color:#fff;max-width:650px;margin:auto;padding:20px}
.card{background:#1b2a3d;padding:15px;border-radius:10px;margin-bottom:15px}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
button{background:#1e88e5;color:#fff;font-weight:bold}
table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #555;padding:6px;text-align:center}
.result{font-size:18px;font-weight:bold}
</style>
</head>
<body>
<h1>🚤 BootPilot</h1>

<div class="card">
<label>Tankinhalt (Liter)</label>
<input id="tank" type="number" step="0.1">

<label>Ø Verbrauch (l/100 km)</label>
<input id="verbrauch" type="number" step="0.1">

<label>Gefahrene Kilometer</label>
<input id="km" type="number" step="0.1">

<button onclick="saveTrip()">Fahrt speichern</button>
</div>

<div class="card">
<div class="result">Restinhalt: <span id="restL">0.0</span> l</div>
<div class="result">Restreichweite: <span id="restKm">0</span> km</div>
</div>

<div class="card">
<h3>Fahrtenbuch</h3>
<table>
<thead><tr><th>Datum</th><th>km</th><th>Liter</th></tr></thead>
<tbody id="log"></tbody>
</table>
</div>

<script>
let tank = Number(localStorage.getItem("tank")) || 0;
let log = JSON.parse(localStorage.getItem("fahrten")||"[]");

document.getElementById("tank").value = tank || "";
render();

function saveTrip(){
 const km = Number(document.getElementById("km").value);
 const v = Number(document.getElementById("verbrauch").value);
 let neuerTank = Number(document.getElementById("tank").value);
 if(!km || !v || isNaN(neuerTank)){alert("Bitte alle Felder ausfüllen.");return;}
 const verbraucht = km*v/100;
 neuerTank = Math.max(0, neuerTank-verbraucht);
 tank = neuerTank;
 localStorage.setItem("tank", tank);
 document.getElementById("tank").value = tank.toFixed(1);
 log.unshift({
   d:new Date().toLocaleDateString("de-DE"),
   km:km.toFixed(1),
   l:verbraucht.toFixed(2)
 });
 localStorage.setItem("fahrten", JSON.stringify(log));
 document.getElementById("km").value="";
 render(v);
}
function render(v){
 const verb = v || Number(document.getElementById("verbrauch").value)||0;
 document.getElementById("restL").textContent=tank.toFixed(1);
 document.getElementById("restKm").textContent=(verb>0?(tank/verb*100):0).toFixed(0);
 const tbody=document.getElementById("log");
 tbody.innerHTML="";
 log.forEach(e=>{
   tbody.innerHTML += `<tr><td>${e.d}</td><td>${e.km}</td><td>${e.l}</td></tr>`;
 });
}
</script>
</body>
</html>
